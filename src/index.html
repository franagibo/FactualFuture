<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Slay the Spire Like</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
</head>
<body>
  <app-root></app-root>
  <canvas id="cursor-sparkle-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:99999;width:100%;height:100%;"></canvas>
  <script>
    (function() {
      var canvas = document.getElementById('cursor-sparkle-canvas');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var mouseX = -999, mouseY = -999;
      var frameId;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      document.addEventListener('pointermove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
        for (var i = 0; i < 2; i++) {
          particles.push({
            x: mouseX,
            y: mouseY,
            vx: (Math.random() - 0.5) * 2.5,
            vy: (Math.random() - 0.5) * 2.5 - 1,
            size: 1.5 + Math.random() * 2,
            life: 1,
            decay: 0.035 + Math.random() * 0.045,
            hue: 35 + Math.random() * 25
          });
        }
      });

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.life -= p.decay;
          if (p.life <= 0) { particles.splice(i, 1); continue; }
          ctx.save();
          ctx.globalAlpha = p.life * 0.7;
          ctx.shadowBlur = 6;
          ctx.shadowColor = 'hsl(' + p.hue + ',100%,65%)';
          ctx.fillStyle = 'hsl(' + p.hue + ',100%,70%)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        frameId = requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
